services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      # Defaults to where nginx below exposes the frontend in this
      # stack. Override in .env if you're serving the frontend
      # elsewhere (e.g. http://localhost:5173 for `npm run dev`
      # against a backend run outside Docker).
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      VALKEY_ADDR: valkey:6379
      LOBBY_TTL: 6h
      LOBBY_CLEANUP_INTERVAL: 10m
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
    # Bump this to run several backend instances behind nginx. Lobby
    # snapshots are shared through Valkey, but a given websocket
    # connection stays pinned to whichever instance accepted it (see
    # nginx/nginx.conf ip_hash), since a live round only lives in the
    # process holding those connections.
    deploy:
      replicas: 1
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--save", ""]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkey-data:/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  valkey-data:
