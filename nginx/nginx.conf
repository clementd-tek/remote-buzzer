worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ip_hash pins a client to the same backend instance across requests.
    # That matters here because a lobby's live round (open websocket
    # connections, in-flight buzz) only exists on whichever instance
    # accepted it; Valkey shares the lobby *directory*, not the round
    # itself. Drop ip_hash if/when the game state moves fully into
    # Valkey (e.g. pub/sub fan-out) and you want plain round-robin.
    upstream backend {
        ip_hash;
        server backend:8080;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        location /healthz {
            proxy_pass http://backend/healthz;
        }

        location /api/ {
            proxy_pass http://backend/api/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Websocket connections are long-lived; don't let nginx time
            # them out after the default 60s of inactivity.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Placeholder: once the frontend exists, serve/proxy it here, e.g.
        #
        # location / {
        #     proxy_pass http://frontend:3000;
        # }
    }
}
