name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build Cross-Platform Binaries & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binaries
        run: |
          mkdir -p dist
          cd backend
          GOOS=linux GOARCH=amd64 go build -o ../dist/buzzer-backend-linux-amd64
          GOOS=darwin GOARCH=amd64 go build -o ../dist/buzzer-backend-darwin-amd64
          GOOS=windows GOARCH=amd64 go build -o ../dist/buzzer-backend-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
